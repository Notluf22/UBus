<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password - UBus</title>
  <link rel="icon" href="UBus logo.png">
  <link rel="stylesheet" href="design-system.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at center, #1e293b 0%, #0a0f1d 100%);
      padding: 20px;
    }
    
    .password-card {
      width: 100%;
      max-width: 380px;
      padding: 40px 30px;
      text-align: center;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    h2 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    
    .subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 25px;
    }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    
    .submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
    }
    
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      font-size: 0.95rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: var(--transition-smooth);
    }
    
    .back-btn:hover {
      color: var(--accent-cyan);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="password-card glass-panel">
    <h2>Change Password</h2>
    <p class="subtitle">Secure your UBus commuter account</p>

    <form id="changePasswordForm">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="••••••••" class="premium-input" required />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" class="premium-input" required />
      </div>
      <button type="submit" id="submit" class="premium-btn submit-btn">Update Password</button>
    </form>

    <a href="account.html" class="back-btn">← Back to Profile</a>
  </div>

  <script type="module" src="changepassword.js"></script>
</body>
</html>
