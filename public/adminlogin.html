<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSRTC Admin - UBus</title>
  <link rel="icon" href="UBus logo.png" />
  <link rel="stylesheet" href="design-system.css">
  <style>
    body {
      background: radial-gradient(circle at 50% 0%, #112240 0%, var(--bg-primary) 70%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .admin-login-wrapper {
      max-width: 420px;
      width: 100%;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header img {
      width: 60px;
      height: 60px;
      margin-bottom: 15px;
      animation: float 4s ease-in-out infinite;
    }

    .login-header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #ffffff 40%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 30px;
    }

    /* Override input to have a subtle cyber teal glow on focus */
    .premium-input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.25);
    }
  </style>
</head>
<body>

  <div class="admin-login-wrapper">
    <div class="glass-panel" style="padding: 40px;">
      <div class="login-header">
        <img src="UBus logo.png" alt="UBus Logo">
        <h1>Admin Control</h1>
        <p>Access the KSRTC Admin Console</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Administrator Email</label>
          <input type="text" id="username" placeholder="e.g. ksrtc@gmail.com" class="premium-input" required />
        </div>

        <div class="form-group">
          <label for="password">Security Password</label>
          <input type="password" id="password" placeholder="••••••••••••" class="premium-input" required />
        </div>

        <div class="btn-group">
          <button class="premium-btn" type="submit" style="width: 100%; padding: 14px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Sign In to Console
          </button>
          
          <a href="login.html" class="premium-btn-secondary" style="width: 100%; padding: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Commuter Login
          </a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const adminAccounts = [
      { username: "fulton@gmail.com", password: "fulton1234" },
      { username: "ksrtc@gmail.com", password: "ksrtc1234" }
    ];

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const inputUsername = document.getElementById("username").value.trim();
      const inputPassword = document.getElementById("password").value;

      const matchedAdmin = adminAccounts.find(
        admin => admin.username === inputUsername && admin.password === inputPassword
      );

      if (matchedAdmin) {
        sessionStorage.setItem("isAdmin", "true");
        window.location.href = "admindashboard.html"; 
      } else {
        alert("Authentication failed. Invalid admin credentials.");
      }
    });
  </script>

</body>
</html>
