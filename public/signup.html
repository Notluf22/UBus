<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - UBus</title>
  <link rel="icon" href="UBus logo.png">
  <link rel="stylesheet" href="design-system.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: radial-gradient(circle at center, #1e293b 0%, #0a0f1d 100%);
      padding: 20px;
    }
    
    .container {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 60px;
      max-width: 1000px;
      width: 100%;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    .left-panel {
      flex: 1.2;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .left-panel img {
      width: 100%;
      max-width: 480px;
      height: auto;
      filter: drop-shadow(0 15px 30px rgba(6, 182, 212, 0.15));
      animation: float 6s ease-in-out infinite;
    }
    
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    
    .login-box {
      width: 100%;
      max-width: 380px;
      padding: 40px 30px;
      text-align: center;
    }
    
    .login-box h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #ffffff 40%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    
    .submit-btn {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      font-size: 1.05rem;
    }
    
    .signup-box {
      margin-top: 25px;
      padding: 20px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      font-size: 0.95rem;
    }
    
    .signup-box a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition-smooth);
    }
    
    .signup-box a:hover {
      text-decoration: underline;
      filter: brightness(1.2);
    }
    
    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.8rem;
      color: var(--text-muted);
      max-width: 380px;
    }
    
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        gap: 30px;
      }
      .left-panel {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="left-panel">
      <a href="login.html">
        <img src="images-removebg-preview.png" alt="UBus Application Showcase" />
      </a>
    </div>
    
    <div class="right-panel">
      <div class="login-box glass-panel">
        <h1>Create Account</h1>
        <p class="subtitle">Join UBus for smarter local bus travel</p>
        
        <form id="signupForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" placeholder="name@example.com" id="email" class="premium-input" required />
          </div>
          <div class="form-group">
            <label for="password">Create Password</label>
            <input type="password" placeholder="••••••••" id="password" class="premium-input" required />
          </div>
          <button class="premium-btn submit-btn" id="submit" type="submit">Create Account</button>
        </form>
      </div>
      
      <div class="signup-box glass-panel">
        <p>Have an account? <a href="login.html">Log in</a></p>
      </div>
      
      <div class="footer">
        <p>English (India) &bull; &copy; 2026 UBus.</p>
        <p style="margin-top: 4px; font-weight: 500; font-size: 0.75rem;">Developed by Joyal, Fenu, Josh, Fulton</p>
      </div>
    </div>
  </div>

  <script type="module" src="signup.js" defer></script>
</body>
</html>
