<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirm Route Details - UBus</title>
  <link rel="icon" href="logo-transparent-png.png" />
  <link rel="stylesheet" href="design-system.css">
  <style>
    body {
      background: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg-primary) 70%);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .select-section {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
    }
    
    .boarding-pass-card {
      width: 100%;
      max-width: 500px;
      padding: 40px 30px;
      text-align: center;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      border-radius: 20px;
    }
    
    .boarding-pass-card h2 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #ffffff 40%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Ticket visual elements */
    .ticket-stub {
      background: rgba(17, 24, 39, 0.65);
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 30px;
      text-align: left;
      position: relative;
    }
    
    /* Boarding pass notches */
    .ticket-stub::before, .ticket-stub::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #0f1629; /* Blends with bg-primary */
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
    }
    
    .ticket-stub::before { left: -11px; }
    .ticket-stub::after { right: -11px; }
    
    .ticket-detail-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      padding-bottom: 10px;
    }
    
    .ticket-detail-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    
    .detail-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .detail-value {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }
    
    .detail-value.emerald {
      color: var(--accent-emerald);
      font-size: 1.15rem;
    }
    
    .proceed-btn {
      width: 100%;
      padding: 14px;
      font-size: 1.05rem;
    }
  </style>
</head>
<body>

  <!-- Premium Header -->
  <header class="premium-navbar">
    <a href="mainpage.html" class="nav-logo">
      <img src="UBus logo.png" alt="UBus Logo">
      <span>UBus</span>
    </a>
    <div class="nav-links">
      <a href="dashboard.html" style="color: var(--accent-cyan);">Commute Hub</a>
      <a href="feedback.html">Feedback</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact Team</a>
      <a href="account.html" class="nav-profile">
        <img src="account.png" alt="Account Settings">
      </a>
    </div>
  </header>

  <div class="select-section">
    <div class="boarding-pass-card glass-panel" id="busDetailsContainer">
      <h2>Bus Details</h2>
      <div id="busDetails">
        <p style="color: var(--text-secondary);">Retrieving bus metrics...</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    import { auth } from './firebase.js';

    // Route Protection
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "login.html";
      }
    });

    const SUPABASE_URL = "https://wztfguawfjvjuvkwairh.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6dGZndWF3Zmp2anV2a3dhaXJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA1MTc4OTAsImV4cCI6MjA3NjA5Mzg5MH0.3P2_rRQH4lcRyvzf00swTyte0bz68GSVSJjDobY8CsE";
    const client = createClient(SUPABASE_URL, SUPABASE_KEY);

    const selectedBusId = sessionStorage.getItem("selectedBusId");
    console.log("Selected Bus ID:", selectedBusId);

    function toTitleCase(str) {
      return str ? str.charAt(0).toUpperCase() + str.slice(1).toLowerCase() : "N/A";
    }

    async function loadBusDetails() {
      const busDetailsDiv = document.getElementById("busDetails");

      if (!selectedBusId) {
        busDetailsDiv.innerHTML = `
          <div class="ticket-stub" style="text-align: center;">
            <p style="color: var(--accent-rose); font-weight: 700;">⚠️ No bus selected. Go back to available buses.</p>
          </div>
          <a href="dashboard.html" class="premium-btn-secondary" style="width: 100%;">← Search Buses</a>
        `;
        return;
      }

      try {
        const { data: bus, error } = await client
          .from('buses')
          .select('*')
          .eq('bus_id', selectedBusId)
          .single();

        if (error || !bus) {
          busDetailsDiv.innerHTML = `
            <div class="ticket-stub" style="text-align: center;">
              <p style="color: var(--accent-rose); font-weight: 700;">⚠️ Failed to load ticket criteria.</p>
            </div>
            <a href="results.html" class="premium-btn-secondary" style="width: 100%;">← Back to Listings</a>
          `;
          return;
        }

        const source = bus.source || "N/A";
        const destination = bus.destination || "N/A";
        const rate = (bus.bus_type || "").toLowerCase() === "super fast" ? 15 :
                     (bus.bus_type || "").toLowerCase() === "fast" ? 12 : 10;
        const fare = bus.fare || rate;
        
        sessionStorage.setItem('fare', fare); // Confirm cached fare is exact

        busDetailsDiv.innerHTML = `
          <div class="ticket-stub">
            <div class="ticket-detail-item">
              <span class="detail-label">Service Type</span>
              <span class="detail-value" style="color: var(--accent-cyan); font-weight: 800;">${bus.bus_type || "Ordinary"} 🚌</span>
            </div>
            <div class="ticket-detail-item">
              <span class="detail-label">Bus Route ID</span>
              <span class="detail-value">${bus.bus_id}</span>
            </div>
            <div class="ticket-detail-item">
              <span class="detail-label">Departure</span>
              <span class="detail-value">${bus.departure_time || "N/A"} from ${bus.boarding_point || toTitleCase(source)}</span>
            </div>
            <div class="ticket-detail-item">
              <span class="detail-label">Arrival</span>
              <span class="detail-value">${bus.arrival_time || "N/A"} at ${bus.dropping_point || toTitleCase(destination)}</span>
            </div>
            <div class="ticket-detail-item">
              <span class="detail-label">Est. Duration</span>
              <span class="detail-value">${bus.duration || "N/A"} hours</span>
            </div>
            <div class="ticket-detail-item" style="border: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255, 255, 255, 0.1);">
              <span class="detail-label" style="color: #fff;">Base Ticket Fare</span>
              <span class="detail-value emerald">₹${fare}</span>
            </div>
          </div>
          
          <button class="premium-btn proceed-btn" id="proceedBtn">Proceed to Seat Selection</button>
          <a href="results.html" class="premium-btn-secondary" style="width: 100%; margin-top: 12px; display: inline-flex; align-items: center; justify-content: center;">← Change Bus</a>
        `;

        document.getElementById("proceedBtn").addEventListener("click", () => {
          window.location.href = "booking.html";
        });

      } catch (err) {
        console.error("Error loading selected bus details:", err);
        busDetailsDiv.innerHTML = '<div class="ticket-stub" style="text-align: center;"><p style="color: var(--accent-rose);">⚠️ Unexpected connection error.</p></div>';
      }
    }

    document.addEventListener("DOMContentLoaded", loadBusDetails);
  </script>
</body>
</html>
